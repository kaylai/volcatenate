# volcatenate configuration
#
# All settings below show their DEFAULT values (matching the Sulfur
# Comparison Paper).  Edit only the fields you need to change —
# missing keys will use these defaults automatically.
#
# ── Getting started ──────────────────────────────────────────────
# Using a YAML config file is OPTIONAL.  You can also set everything
# in Python:
#
#   from volcatenate.config import RunConfig, EVoConfig
#   config = RunConfig(evo=EVoConfig(p_stop=10))
#
# To use a YAML file instead:
#
#   1. Generate your own copy (DO NOT edit the bundled original —
#      it lives inside the installed package and will be overwritten
#      on reinstall):
#
#        volcatenate init-config                   # → ./volcatenate_config.yaml
#        volcatenate init-config -o my_config.yaml # → custom path
#
#   2. Open the copy and change only what you need.
#      You can safely delete entire sections you don't need.
#
#   3. Load it in Python or from the CLI:
#
#        config = volcatenate.load_config("volcatenate_config.yaml")
#
#        volcatenate saturation-pressure input.csv --config my_config.yaml

output_dir: "."  # Root directory for all output (default: working directory)
raw_output_dir: raw_tool_output  # Subdirectory for raw model files (EVo YAML, MAGEC scripts, etc.)
keep_raw_output: true  # Keep raw tool output files after run
verbose: false  # Print progress to terminal
log_file: ""  # Write all output to this file (empty = no log file)
show_progress: true  # Show rich progress bars (True/False)

vesical:
  model: IaconoMarziano  # Solubility model name
  steps: 101  # Number of degassing steps
  final_pressure: 1.0  # bar
  fractionate_vapor: 0.0  # 0 = closed-system, 1 = open-system

volfe:
  sulfur_saturation: false
  graphite_saturation: false
  fo2_column: Fe3FeT  # 'DNNO', 'Fe3FeT', or 'DFMQ'
  gassing_style: closed  # 'closed' or 'open'
  gassing_direction: degas  # 'degas' or 'regas'
  bulk_composition: melt-only  # 'melt-only', 'melt+vapor_wtg', or 'melt+vapor_initialCO2'
  coh_species: yes_H2_CO_CH4_melt  # 'yes_H2_CO_CH4_melt', 'no_H2_CO_CH4_melt', or 'H2O-CO2 only'
  h2s_melt: true  # Include H2Smol as dissolved melt species
  species_x: Ar  # 'Ar' or 'Ne'
  fo2_model: Kress91A  # fO2-Fe3+/FeT: 'Kress91A', 'Kress91', 'ONeill18', 'Borisov18'
  fmq_buffer: Frost91  # FMQ buffer: 'Frost91' or 'ONeill87'
  co2_sol: MORB_Dixon95  # CO2T solubility constant
  h2o_sol: Basalt_Hughes24  # H2O solubility constant
  h2_sol: Basalt_Hughes24  # H2 solubility constant
  sulfide_sol: ONeill21dil  # S2- solubility constant
  sulfate_sol: ONeill22dil  # S6+ solubility constant
  h2s_sol: Basalt_Hughes24  # H2S solubility constant
  ch4_sol: Basalt_Ardia13  # CH4 solubility constant
  co_sol: Basalt_Hughes24  # CO solubility constant
  x_sol: Ar_Basalt_HughesIP  # Species X solubility constant
  c_spec_comp: Basalt  # CO2mol/CO32- speciation model
  h_spec_comp: MORB_HughesIP  # H2Omol/OH- speciation model
  scss: ONeill21hyd  # SCSS model
  scas: Zajacz19_pss  # SCAS model
  ideal_gas: false  # Treat all vapor species as ideal gases
  y_co2: Shi92  # CO2 fugacity coefficient model
  y_so2: Shi92_Hughes23  # SO2 fugacity coefficient model
  y_h2s: Shi92_Hughes24  # H2S fugacity coefficient model
  y_h2: Shaw64  # H2 fugacity coefficient model
  y_o2: Shi92  # O2 fugacity coefficient model
  y_s2: Shi92  # S2 fugacity coefficient model
  y_co: Shi92  # CO fugacity coefficient model
  y_ch4: Shi92  # CH4 fugacity coefficient model
  y_h2o: Holland91  # H2O fugacity coefficient model
  y_ocs: Shi92  # OCS fugacity coefficient model
  k_hosg: Ohmoto97  # H2S equilibrium constant
  k_osg: Ohmoto97  # SO2 equilibrium constant
  k_cohg: Ohmoto97  # CH4 equilibrium constant
  k_ocsg: Moussallam19  # OCS equilibrium constant

evo:
  gas_system: cohs  # 'cohs', 'coh', 'cos', etc.
  fo2_buffer: FMQ  # 'FMQ', 'NNO', etc.
  fe_system: true  # Include Fe redox equilibrium
  find_saturation: true  # Find saturation pressure automatically
  atomic_mass_set: false  # Use atomic mass fractions for H/C/S/N
  ocs: false  # Include OCS as a gas species
  dp_min: 1  # Minimum pressure step (bar)
  dp_max: 100  # Maximum pressure step (bar)
  mass: 100  # System mass (g)
  p_start: 3000  # Starting pressure (bar)
  p_stop: 1  # Final pressure (bar)
  wgt: 0.00001  # Initial gas weight fraction
  loss_frac: 0.9999  # Gas loss fraction per step (open-system)
  atomic_h: 500  # Atomic H (ppm) — only used when atomic_mass_set=true
  atomic_c: 200  # Atomic C (ppm) — only used when atomic_mass_set=true
  atomic_s: 4000  # Atomic S (ppm) — only used when atomic_mass_set=true
  atomic_n: 10  # Atomic N (ppm) — only used when atomic_mass_set=true
  nitrogen_set: false  # Set N from composition
  graphite_saturated: false  # Graphite saturation at start
  h2o_model: burguisser2015
  h2_model: gaillard2003
  c_model: burguisser2015
  co_model: armstrong2015
  ch4_model: ardia2013
  sulfide_capacity: oneill2020
  sulfate_capacity: nash2019
  scss: liu2007
  n_model: libourel2003
  density_model: spera2000
  fo2_model: kc1991
  fmq_model: frost1991
  overrides: {}  # Per-sample overrides, e.g. {MORB: {dp_max: 25}}

magec:
  # Paths are auto-detected. Set here to override, or use env vars
  # MAGEC_SOLVER_DIR and MATLAB_BIN.
  solver_dir: ""  # Path to directory containing MAGEC_Solver_v1b.p (auto-detected)
  matlab_bin: ""  # Path to MATLAB binary (auto-detected)
  sulfide_sat: 0  # (1) Yes; (0) No
  sulfate_sat: 0  # (1) Yes; (0) No
  graphite_sat: 0  # (1) Yes; (0) No
  fe_redox: 1  # (1) Sun & Yao 2024; (2) KC91; (3) Hirschmann 2022
  s_redox: 1  # (1) Sun & Yao 2024; (2) Nash 2019; (3) Jugo 2010; (4) O'Neill 2022; (5) Boulliung 2023
  scss: 1  # (1) Blanchard 2021; (2) Fortin 2015; (3) Smythe 2017; (4) O'Neill 2021
  sulfide_cap: 1  # (1) Nzotta 1999; (2) O'Neill 2021; (3) Boulliung 2023
  co2_sol: 1  # (1) IM2012; (2) Liu 2005; (3.x) Burgisser 2015
  h2o_sol: 1  # (1) IM2012; (2) Liu 2005; (3.x) Burgisser 2015
  co_sol: 1  # (1) Armstrong 2015; (2.x) Yoshioka 2019
  adiabatic: 0  # 0 = isothermal
  solver: 2  # (1) lsqnonlin; (2) fsolve
  gas_behavior: 1  # (1) real gas; (2) ideal
  o2_balance: 0  # (0) Total O balanced; (1) fixed fO2 buffer
  redox_option: Fe3+/FeT  # 'logfO2', 'dFMQ', 'Fe3+/FeT', or 'S6+/ST'
  p_start_kbar: 3.0  # SatP search start pressure (kbar)
  p_final_kbar: 0.001  # SatP search end pressure (kbar)
  n_steps: 100  # Number of pressure steps for SatP search
  timeout: 300  # MATLAB subprocess timeout (seconds)
  overrides: {}  # Per-sample overrides, e.g. {Fogo: {p_start_kbar: 8.0}}

sulfurx:
  # Path is auto-detected. Set here to override, or use env var SULFURX_PATH.
  path: ""  # Path to SulfurX installation (auto-detected)
  coh_model: 0  # 0 = Iacono-Marziano, 1 = VolatileCalc
  slope_h2o: -0.3396  # K2O-H2O relationship slope: K2O = a*H2O + b
  constant_h2o: 2.7  # K2O-H2O relationship intercept
  n_steps: 600  # Pressure grid steps for degassing
  fo2_tracker: 1  # 0 = buffered fO2, 1 = redox evolution
  s_fe_choice: 1  # S speciation: 0=Nash, 1=O'Neill&Mavrogenes
  sigma: 0.005  # log10fO2 tolerance for redox calculation
  sulfide_pre: 0  # 0 = no sulfide precipitation, 1 = enabled
